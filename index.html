<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ЩёУэЬгЭі ЁЄ Web</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="loading-screen">
        <div class="logo">TEMPLE RUN</div>
        <div class="loading-bar">
          <div class="loading-progress"></div>
        </div>
        <div class="loading-text">зЪдДМгдижа...</div>
      </div>

      <canvas id="game-canvas"></canvas>

      <div id="hud" class="hidden">
        <div class="hud-left">
          <div class="hud-item">ОрРы: <span id="hud-distance">0</span>m</div>
          <div class="hud-item">Н№Бв: <span id="hud-coins">0</span></div>
        </div>
        <div class="hud-right">
          <button id="pause-btn" class="hud-btn">днЭЃ</button>
        </div>
      </div>

      <div id="start-screen" class="screen">
        <div class="screen-panel">
          <h1>ЩёУэЬгЭі</h1>
          <p>МќХЬВйзїЃКA/D Лђ Ёћ/Ёњ ЛЛЕРЃЌПеИёЬјдОЃЌS ЯТЛЌ</p>
          <button id="start-btn" class="primary">ПЊЪМгЮЯЗ</button>
          <button id="settings-btn">ЩшжУ</button>
          <button id="leaderboard-btn">ХХааАё</button>
        </div>
      </div>

      <div id="pause-screen" class="screen hidden">
        <div class="screen-panel">
          <h2>вбднЭЃ</h2>
          <button id="resume-btn" class="primary">МЬај</button>
          <button id="restart-btn">жиаТПЊЪМ</button>
          <button id="quit-btn">ЭЫГіЕНжїВЫЕЅ</button>
        </div>
      </div>

      <div id="gameover-screen" class="screen hidden">
        <div class="screen-panel">
          <h2>гЮЯЗНсЪј</h2>
          <div class="result-line">БООжОрРыЃК<span id="result-distance">0</span>m</div>
          <div class="result-line">БООжН№БвЃК<span id="result-coins">0</span></div>
          <div class="result-line">зюИпЗжЃК<span id="result-best">0</span></div>
          <button id="restart-btn-2" class="primary">дйРДвЛДЮ</button>
          <button id="quit-btn-2">ЗЕЛижїВЫЕЅ</button>
        </div>
      </div>

      <div id="settings-screen" class="screen hidden">
        <div class="screen-panel">
          <h2>ЩшжУ</h2>
          <label class="setting-row">
            вєСП
            <input id="volume-range" type="range" min="0" max="1" step="0.05" value="0.7" />
          </label>
          <label class="setting-row">
            Л­жЪ
            <select id="quality-select">
              <option value="high">Ип</option>
              <option value="medium">жа</option>
              <option value="low">ЕЭ</option>
            </select>
          </label>
          <button id="settings-back" class="primary">ЗЕЛи</button>
        </div>
      </div>

      <div id="leaderboard-screen" class="screen hidden">
        <div class="screen-panel">
          <h2>ХХааАё</h2>
          <ol id="leaderboard-list"></ol>
          <button id="leaderboard-back" class="primary">ЗЕЛи</button>
        </div>
      </div>

      <div id="tutorial" class="tutorial hidden">
        <div>АД A/D Лђ Ёћ/Ёњ ЛЛЕР</div>
        <div>ПеИёЬјдОЃЌS ЯТЛЌ</div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
