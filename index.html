<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ЙсГнМУНц ЎӨ Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="loading-screen">
        <div class="logo">TEMPLE RUN</div>
        <div class="loading-bar">
          <div class="loading-progress"></div>
        </div>
        <div class="loading-text">ЧКФҙјУФШЦР...</div>
      </div>

      <canvas id="game-canvas"></canvas>

      <div id="hud" class="hidden">
        <div class="hud-left">
          <div class="hud-item">ҫаАл: <span id="hud-distance">0</span>m</div>
          <div class="hud-item">ҪрұТ: <span id="hud-coins">0</span></div>
        </div>
        <div class="hud-right">
          <button id="pause-btn" class="hud-btn">ФЭНЈ</button>
        </div>
      </div>

      <div id="start-screen" class="screen">
        <div class="screen-panel">
          <h1>ЙсГнМУНц</h1>
          <p>јьЕМІЩЧчЈәA/D »т Ўы/Ўъ »»өАЈ¬ҝХёсМшФҫЈ¬S ПВ»¬</p>
          <button id="start-btn" class="primary">ҝӘКјУОП·</button>
          <button id="settings-btn">ЙиЦГ</button>
          <button id="leaderboard-btn">ЕЕРР°с</button>
        </div>
      </div>

      <div id="pause-screen" class="screen hidden">
        <div class="screen-panel">
          <h2>ТСФЭНЈ</h2>
          <button id="resume-btn" class="primary">јМРш</button>
          <button id="restart-btn">ЦШРВҝӘКј</button>
          <button id="quit-btn">НЛіцөҪЦчІЛөҘ</button>
        </div>
      </div>

      <div id="gameover-screen" class="screen hidden">
        <div class="screen-panel">
          <h2>УОП·ҪбКш</h2>
          <div class="result-line">ұҫҫЦҫаАлЈә<span id="result-distance">0</span>m</div>
          <div class="result-line">ұҫҫЦҪрұТЈә<span id="result-coins">0</span></div>
          <div class="result-line">ЧоёЯ·ЦЈә<span id="result-best">0</span></div>
          <button id="restart-btn-2" class="primary">ФЩАҙТ»ҙО</button>
          <button id="quit-btn-2">·ө»ШЦчІЛөҘ</button>
        </div>
      </div>

      <div id="settings-screen" class="screen hidden">
        <div class="screen-panel">
          <h2>ЙиЦГ</h2>
          <label class="setting-row">
            ТфБҝ
            <input id="volume-range" type="range" min="0" max="1" step="0.05" value="0.7" />
          </label>
          <label class="setting-row">
            »ӯЦК
            <select id="quality-select">
              <option value="high">ёЯ</option>
              <option value="medium">ЦР</option>
              <option value="low">өН</option>
            </select>
          </label>
          <button id="settings-back" class="primary">·ө»Ш</button>
        </div>
      </div>

      <div id="leaderboard-screen" class="screen hidden">
        <div class="screen-panel">
          <h2>ЕЕРР°с</h2>
          <ol id="leaderboard-list"></ol>
          <button id="leaderboard-back" class="primary">·ө»Ш</button>
        </div>
      </div>

      <div id="tutorial" class="tutorial hidden">
        <div>°ҙ A/D »т Ўы/Ўъ »»өА</div>
        <div>ҝХёсМшФҫЈ¬S ПВ»¬</div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
